<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
      color: #333;
      width: 360px;
      min-height: 100px;
    }
    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
    }
    .attachment-list {
      list-style: none;
      padding: 0;
      margin: 0 0 12px 0;
    }
    .attachment-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }
    .attachment-list li:last-child {
      border-bottom: none;
    }
    .attachment-list input[type="checkbox"] {
      flex-shrink: 0;
    }
    .att-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .att-size {
      flex-shrink: 0;
      color: #888;
      font-size: 11px;
    }
    .att-status {
      flex-shrink: 0;
      width: 18px;
      text-align: center;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 8px;
    }
    .form-group label {
      display: block;
      margin-bottom: 3px;
    }
    select {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    .folder-section {
      margin-bottom: 12px;
    }
    .folder-breadcrumb {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 6px;
      font-size: 12px;
      flex-wrap: wrap;
    }
    .folder-breadcrumb button {
      background: none;
      border: none;
      color: #4a90d9;
      cursor: pointer;
      padding: 2px 4px;
      font-size: 12px;
    }
    .folder-breadcrumb button:hover {
      text-decoration: underline;
    }
    .folder-breadcrumb span {
      color: #888;
    }
    .folder-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .folder-list:empty {
      display: none;
    }
    .folder-list li {
      padding: 5px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .folder-list li:hover {
      background: #f0f4ff;
    }
    .folder-icon {
      font-size: 14px;
    }
    .current-path {
      font-size: 12px;
      color: #555;
      background: #f5f5f5;
      padding: 4px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      word-break: break-all;
    }
    button.primary {
      padding: 6px 16px;
      border: 1px solid #3a7bc8;
      border-radius: 4px;
      background: #4a90d9;
      color: white;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
    }
    button.primary:hover {
      background: #3a7bc8;
    }
    button.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 4px;
      display: none;
      font-size: 12px;
    }
    .status.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .empty-msg {
      color: #888;
      text-align: center;
      padding: 16px;
    }
    .select-all {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <h3 data-i18n="saveToSeafile">Save to Seafile</h3>

  <div id="loading" class="empty-msg" data-i18n="loading">Loading...</div>
  <div id="noAttachments" class="empty-msg" style="display:none" data-i18n="noAttachments">No attachments found.</div>
  <div id="notConfigured" class="empty-msg" style="display:none" data-i18n="notConfigured">No Seafile account configured.</div>

  <div id="content" style="display:none">
    <div class="select-all">
      <input type="checkbox" id="selectAll" checked>
      <label for="selectAll" data-i18n="selectAll">Select all</label>
    </div>
    <ul class="attachment-list" id="attachmentList"></ul>

    <div class="folder-section">
      <div class="form-group">
        <label for="repoSelect" data-i18n="targetLibrary">Library:</label>
        <select id="repoSelect"></select>
      </div>
      <label data-i18n="targetFolder">Folder:</label>
      <div class="current-path" id="currentPath">/</div>
      <ul class="folder-list" id="folderList"></ul>
    </div>

    <button id="saveBtn" class="primary" data-i18n="saveToSeafile">Save to Seafile</button>
    <div id="saveStatus" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
