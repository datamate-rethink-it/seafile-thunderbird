<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
      color: #333;
      width: 360px;
      min-height: 100px;
    }
    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
    }
    .attachment-list {
      list-style: none;
      padding: 0;
      margin: 0 0 12px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      max-height: 200px;
      overflow-y: auto;
    }
    .attachment-list li {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 12px;
    }
    .attachment-list li:last-child {
      border-bottom: none;
    }
    .attachment-list input[type="checkbox"] {
      flex-shrink: 0;
    }
    .att-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: text;
      padding: 1px 3px;
      border: 1px solid transparent;
      border-radius: 3px;
    }
    .att-name:hover {
      border-color: #ccc;
    }
    .att-name:focus {
      outline: none;
      border-color: #4a90d9;
      background: #fff;
    }
    .att-name.renamed {
      color: #4a90d9;
    }
    .att-reset {
      display: none;
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      cursor: pointer;
      color: #999;
    }
    .att-reset:hover {
      color: #4a90d9;
    }
    .att-reset.visible {
      display: flex;
    }
    .att-size {
      flex-shrink: 0;
      color: #888;
      font-size: 11px;
      margin-left: auto;
    }
    .att-status {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .att-status svg {
      display: block;
    }
    .form-group {
      margin-bottom: 8px;
    }
    .form-group label {
      display: block;
      margin-bottom: 3px;
    }
    select {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      background: #f5f5f5;
    }
    .folder-breadcrumb {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 6px;
      font-size: 12px;
      flex-wrap: wrap;
    }
    .folder-breadcrumb button {
      background: none;
      border: none;
      color: #4a90d9;
      cursor: pointer;
      padding: 2px 4px;
      font-size: 12px;
    }
    .folder-breadcrumb button:hover {
      text-decoration: underline;
    }
    .folder-breadcrumb span {
      color: #888;
    }
    .folder-picker {
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .folder-picker .current-path {
      font-size: 12px;
      color: #555;
      background: #f5f5f5;
      padding: 5px 8px;
      word-break: break-all;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }
    .folder-picker .current-path:hover {
      background: #eee;
    }
    .folder-picker .current-path .toggle-arrow {
      font-size: 10px;
      color: #999;
      transition: transform 0.15s;
    }
    .folder-picker.open .current-path {
      border-bottom: 1px solid #eee;
    }
    .folder-picker.open .current-path .toggle-arrow {
      transform: rotate(180deg);
    }
    .folder-picker .folder-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 120px;
      overflow-y: auto;
      display: none;
    }
    .folder-picker.open .folder-list {
      display: block;
    }
    .folder-picker .folder-list:empty::after {
      content: attr(data-empty);
      display: block;
      padding: 8px;
      color: #aaa;
      font-size: 12px;
    }
    .folder-picker .folder-list li {
      padding: 4px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .folder-picker .folder-list li:hover {
      background: #f0f4ff;
    }
    .folder-icon {
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
    }
    .folder-icon svg {
      display: block;
    }
    button.primary {
      padding: 6px 16px;
      border: 1px solid #3a7bc8;
      border-radius: 4px;
      background: #4a90d9;
      color: white;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
    }
    button.primary:hover {
      background: #3a7bc8;
    }
    button.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 4px;
      display: none;
      font-size: 12px;
    }
    .status.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .empty-msg {
      color: #888;
      text-align: center;
      padding: 16px;
    }
    .select-all {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <h3 data-i18n="saveToSeafile">Save to Seafile</h3>

  <div id="accountSelector" class="form-group" style="display:none">
    <select id="accountSelect"></select>
  </div>

  <div id="loading" class="empty-msg" data-i18n="loading">Loading...</div>
  <div id="noAttachments" class="empty-msg" style="display:none" data-i18n="noAttachments">No attachments found.</div>
  <div id="notConfigured" class="empty-msg" style="display:none" data-i18n="notConfigured">No Seafile account configured.</div>

  <div id="content" style="display:none">
    <div class="form-group">
      <label for="repoSelect" data-i18n="targetLibrary">Target Library</label>
      <select id="repoSelect"></select>
    </div>
    <label data-i18n="targetFolder">Target folder:</label>
    <div class="folder-picker" id="folderPicker">
      <div class="current-path" id="currentPath"><span class="path-text">/</span><span class="toggle-arrow">&#9662;</span></div>
      <ul class="folder-list" id="folderList" data-empty="No subfolders" data-i18n-empty="noSubfolders"></ul>
    </div>

    <div class="select-all">
      <input type="checkbox" id="selectAll" checked>
      <label for="selectAll" data-i18n="selectAll">Select all</label>
    </div>
    <ul class="attachment-list" id="attachmentList"></ul>

    <button id="saveBtn" class="primary" data-i18n="saveToSeafile">Save to Seafile</button>
    <div id="saveStatus" class="status"></div>
  </div>

  <script src="../icons/file-icons.js"></script>
  <script src="popup.js"></script>
</body>
</html>
