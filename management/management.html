<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 0;
      color: #333;
      background: transparent;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
    }
    input[type="text"],
    input[type="password"],
    input[type="url"],
    input[type="number"],
    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
    }
    button {
      padding: 6px 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f0f0f0;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover {
      background: #e0e0e0;
    }
    button.primary {
      background: #4a90d9;
      color: white;
      border-color: #3a7bc8;
    }
    button.primary:hover {
      background: #3a7bc8;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .status.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
    }
    .hint {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: #888;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid #ccc;
      margin: 0;
      padding: 0 16px;
    }
    .tab {
      padding: 8px 16px;
      cursor: pointer;
      border: 1px solid transparent;
      border-bottom: none;
      margin-bottom: -1px;
      border-radius: 4px 4px 0 0;
      font-size: 13px;
      color: #555;
    }
    .tab:hover {
      color: #333;
      background: #f5f5f5;
    }
    .tab.active {
      background: white;
      border-color: #ccc;
      color: #333;
      font-weight: 600;
    }
    .tab-content {
      display: none;
      padding: 16px;
    }
    .tab-content.active {
      display: block;
    }
    .settings-tabs {
      display: none;
    }
    .settings-tabs.visible {
      display: block;
    }
    .folder-picker {
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
    }
    .folder-picker .current-path {
      font-size: 12px;
      color: #555;
      background: #f5f5f5;
      padding: 5px 8px;
      border-bottom: 1px solid #eee;
      word-break: break-all;
    }
    .folder-picker .folder-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 120px;
      overflow-y: auto;
    }
    .folder-picker .folder-list:empty::after {
      content: attr(data-empty);
      display: block;
      padding: 8px;
      color: #aaa;
      font-size: 12px;
    }
    .folder-picker .folder-list li {
      padding: 4px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .folder-picker .folder-list li:hover {
      background: #f0f4ff;
    }
  </style>
</head>
<body>
  <!-- Connection (always visible) -->
  <div style="padding: 16px 16px 0 16px;">
    <div class="form-group">
      <label for="serverUrl" data-i18n="serverUrl">Server URL</label>
      <input type="url" id="serverUrl" placeholder="https://cloud.seafile.com">
    </div>
    <div class="form-group">
      <label for="username" data-i18n="username">Username / Email</label>
      <input type="text" id="username" placeholder="user@example.com">
    </div>
    <div class="form-group">
      <label for="password" data-i18n="password">Password</label>
      <input type="password" id="password">
    </div>
    <div class="form-group">
      <label for="otp" data-i18n="otpLabel">2FA Code</label>
      <input type="text" id="otp" inputmode="numeric" autocomplete="one-time-code" placeholder="123456">
      <span class="hint" data-i18n="otpHint">Only required if two-factor authentication is enabled.</span>
    </div>
    <button id="connectBtn" class="primary" data-i18n="connect">Connect</button>
    <div id="connectStatus" class="status"></div>
  </div>

  <!-- Tabs (visible after connect) -->
  <div class="settings-tabs" id="settingsTabs">
    <div class="tabs" style="margin-top: 12px;">
      <div class="tab active" data-tab="sharing" data-i18n="tabSharing">Sharing</div>
      <div class="tab" data-tab="saving" data-i18n="tabSaving">Saving</div>
    </div>

    <!-- Tab: Sharing -->
    <div class="tab-content active" id="tab-sharing">
      <div class="form-group">
        <label for="repoSelect" data-i18n="targetLibrary">Target Library</label>
        <select id="repoSelect">
          <option value="" data-i18n="selectLibrary">-- Select a library --</option>
        </select>
        <span class="hint" data-i18n="encryptedHint">Encrypted libraries are not supported.</span>
      </div>
      <div class="form-group">
        <label data-i18n="uploadFolder">Upload Folder</label>
        <div class="folder-picker" id="uploadFolderPicker">
          <div class="current-path" id="uploadPath">/</div>
          <ul class="folder-list" id="uploadFolderList" data-empty="No subfolders"></ul>
        </div>
      </div>
      <div class="form-group">
        <label for="sharePassword" data-i18n="sharePassword">Password Protection</label>
        <input type="text" id="sharePassword" placeholder="">
        <span class="hint" data-i18n="sharePasswordHint">Leave empty for no password</span>
      </div>
      <div class="form-group">
        <label for="shareExpireDays" data-i18n="shareExpireDays">Expiration (days)</label>
        <input type="number" id="shareExpireDays" min="0" placeholder="0">
        <span class="hint" data-i18n="shareExpireDaysHint">0 = no expiration</span>
      </div>
    </div>

    <!-- Tab: Saving -->
    <div class="tab-content" id="tab-saving">
      <div class="form-group">
        <label for="saveRepoSelect" data-i18n="saveTargetLibrary">Default Library</label>
        <select id="saveRepoSelect">
          <option value="" data-i18n="sameAsUpload">-- Same as upload library --</option>
        </select>
      </div>
      <div class="form-group">
        <label data-i18n="saveFolder">Default Folder</label>
        <div class="folder-picker" id="saveFolderPicker">
          <div class="current-path" id="savePath">/</div>
          <ul class="folder-list" id="saveFolderList" data-empty="No subfolders"></ul>
        </div>
      </div>
    </div>

    <div style="padding: 0 16px 16px 16px;">
      <button id="saveBtn" class="primary" data-i18n="save">Save</button>
      <div id="saveStatus" class="status"></div>
    </div>
  </div>

  <script src="management.js"></script>
</body>
</html>
