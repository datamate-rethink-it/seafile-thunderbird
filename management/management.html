<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 16px;
      color: #333;
      background: transparent;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
    }
    input[type="text"],
    input[type="password"],
    input[type="url"],
    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
    }
    button {
      padding: 6px 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f0f0f0;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover {
      background: #e0e0e0;
    }
    button.primary {
      background: #4a90d9;
      color: white;
      border-color: #3a7bc8;
    }
    button.primary:hover {
      background: #3a7bc8;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .status.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .section {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }
    .section:last-child {
      border-bottom: none;
    }
    .library-section {
      display: none;
    }
    .library-section.visible {
      display: block;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
    }
    .hint {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="section">
    <h3 data-i18n="serverConnection">Server Connection</h3>
    <div class="form-group">
      <label for="serverUrl" data-i18n="serverUrl">Server URL</label>
      <input type="url" id="serverUrl" placeholder="https://cloud.seafile.com">
    </div>
    <div class="form-group">
      <label for="username" data-i18n="username">Username / Email</label>
      <input type="text" id="username" placeholder="user@example.com">
    </div>
    <div class="form-group">
      <label for="password" data-i18n="password">Password</label>
      <input type="password" id="password">
    </div>
    <button id="connectBtn" class="primary" data-i18n="connect">Connect</button>
    <div id="connectStatus" class="status"></div>
  </div>

  <div class="section library-section" id="librarySection">
    <h3 data-i18n="uploadSettings">Upload Settings</h3>
    <div class="form-group">
      <label for="repoSelect" data-i18n="targetLibrary">Target Library</label>
      <select id="repoSelect">
        <option value="" data-i18n="selectLibrary">-- Select a library --</option>
      </select>
    </div>
    <div class="form-group">
      <label for="uploadPath" data-i18n="uploadFolder">Upload Folder</label>
      <input type="text" id="uploadPath" value="/Thunderbird-Attachments">
    </div>
    <h3 data-i18n="shareLinkOptions">Share Link Options</h3>
    <div class="form-group">
      <label for="sharePassword" data-i18n="sharePassword">Password Protection</label>
      <input type="text" id="sharePassword" placeholder="">
      <span class="hint" data-i18n="sharePasswordHint">Leave empty for no password</span>
    </div>
    <div class="form-group">
      <label for="shareExpireDays" data-i18n="shareExpireDays">Expiration (days)</label>
      <input type="number" id="shareExpireDays" min="0" placeholder="0">
      <span class="hint" data-i18n="shareExpireDaysHint">0 = no expiration</span>
    </div>
    <button id="saveBtn" class="primary" data-i18n="save">Save</button>
    <div id="saveStatus" class="status"></div>
  </div>

  <script src="management.js"></script>
</body>
</html>
